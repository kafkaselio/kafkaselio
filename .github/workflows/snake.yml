name: Generate Snake

on:
schedule:
- cron: "0 */12 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Generate snake animation
    uses: Platane/snk@v3
    with:
      github_user_name: kafkaselio
      outputs: |
        dist/github-snake.svg?color_snake=bb9af7&color_dots=%2316161e,%2324283b,%23414868,%237aa2f7,%23bb9af7

  - name: Push snake to output branch
    uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
